<svg width="80" height="17" viewBox="0 0 80 17" xmlns="http://www.w3.org/2000/svg">
  <!-- Bottom Layer (Base Pipe) -->
  <line x1="0" y1="8.5" x2="80" y2="8.5" stroke="#757575" stroke-width="17" />
  <!-- Middle Layer (Gradient/Shading Effect) -->
  <line x1="0" y1="8.5" x2="80" y2="8.5" stroke="#bdbdbd" stroke-width="14" />
  <!-- Top Layer (Highlight) -->
  <line x1="0" y1="8.5" x2="80" y2="8.5" stroke="#f5f5f5" stroke-width="3" stroke-dasharray="1.5,1.5" opacity="0.8" />
  <!-- Thin centerline -->
  <line x1="0" y1="8.5" x2="80" y2="8.5" stroke="#ffffff" stroke-width="0.5" opacity="0.5" />
</svg>
